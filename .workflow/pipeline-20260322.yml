# 与仓库根目录 gitee/pipeline-20260322.yml 保持一致（Gitee Go 保存流水线时可能写入 .workflow/）
version: '1.0'
name: pipeline-20260322
displayName: pipeline-20260322
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''

stages:
  - stage:
    name: build
    displayName: 构建与打包
    steps:
      - step: build@nodejs
        name: ebu4_site_pack
        displayName: ebu4-site · 测试并打生产包（需 Node 20）
        nodeVersion: '20'
        commands:
          - bash scripts/package-prod.sh
        artifacts:
          - name: EBU4_SITE_DEPLOY
            path:
              - ./dist
