# 在 GitHub 托管的仓库中自动运行；仅推送到 Gitee 时不会执行（需镜像到 GitHub 或在 Gitee 配置流水线 / 使用 scripts/ci.sh）。
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ebu4-site/package-lock.json

      - name: Install dependencies
        working-directory: ebu4-site
        run: npm ci

      - name: Run tests
        working-directory: ebu4-site
        run: npm test
