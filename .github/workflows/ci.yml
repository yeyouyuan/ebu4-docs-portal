# GitHub Actions：测试 + 打正式部署包（tar.gz，含生产依赖 node_modules）
# 制品在 Actions「Artifacts」中下载；与 Gitee 无联动。
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ebu4-site/package-lock.json

      - name: Production package (test + npm ci --omit=dev + tar.gz)
        run: bash scripts/package-prod.sh

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebu4-site-prod-linux-x64
          path: dist/*.tar.gz
          if-no-files-found: error
