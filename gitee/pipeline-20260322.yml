# Gitee Go · Nodejs 构建
# ⚠️ 必须在「可视化」里把 Node 版本选为 20.x（与 ebu4-site/.nvmrc 一致）。
#    若仍为 18.x，better-sqlite3 无预编译包会强制源码编译，且易缺 Python。
#
# monorepo：工作目录为仓库根；制品 ./dist

version: '1.0'
name: pipeline-20260322
displayName: pipeline-20260322
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''

stages:
  - stage:
    name: build
    displayName: 构建与打包
    steps:
      - step: build@nodejs
        name: ebu4_site_pack
        displayName: ebu4-site · 测试并打生产包（需 Node 20）
        nodeVersion: '20'
        commands:
          - bash scripts/package-prod.sh
        artifacts:
          - name: EBU4_SITE_DEPLOY
            path:
              - ./dist
