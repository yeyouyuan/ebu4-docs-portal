<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>EBU4 · 注册后台账号</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--surface:#111118;--surface2:#18181f;--surface3:#22222e;
  --border:#252535;--border2:#333348;
  --text:#e4e4ef;--text2:#9898aa;--text3:#5e5e74;
  --accent:#e8b931;--accent2:#f0c848;--accent-dim:rgba(232,185,49,.08);--accent-glow:rgba(232,185,49,.12);
  --red:#ef4444;--green:#34d399;--green-dim:rgba(52,211,153,.12);--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --r:10px;--r2:14px;--r3:18px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow2:0 8px 40px rgba(0,0,0,.6);
  --ease:cubic-bezier(.4,0,.2,1);
  --bounce:cubic-bezier(.34,1.56,.64,1);
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden}
input,button,select,textarea{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;outline:none}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,185,49,.06),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(96,165,250,.04),transparent 50%),radial-gradient(ellipse 50% 40% at 10% 60%,rgba(167,139,250,.04),transparent 50%)}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 50% 40%,black,transparent)}
.bg-orbs{position:absolute;inset:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:orbFloat 12s ease-in-out infinite}
.orb-1{width:300px;height:300px;background:var(--accent);top:-80px;right:10%;animation-delay:0s}
.orb-2{width:250px;height:250px;background:var(--blue);bottom:-60px;left:5%;animation-delay:-4s}
.orb-3{width:200px;height:200px;background:var(--purple);top:40%;left:60%;animation-delay:-8s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}

.auth-card{width:100%;max-width:440px;opacity:0;animation:cardIn .7s var(--ease) forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.card-inner{background:rgba(17,17,24,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;box-shadow:var(--shadow2)}

.card-hd{padding:32px 32px 0;text-align:center;position:relative}
.card-hd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--orange),var(--accent))}

.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
.brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--orange));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,185,49,.25)}
.brand-icon svg{width:22px;height:22px;color:var(--bg)}
.brand-text{font-size:15px;font-weight:800;letter-spacing:.5px}

.card-title{font-size:24px;font-weight:800;letter-spacing:-.3px;margin-bottom:8px;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.card-desc{font-size:13.5px;color:var(--text3);line-height:1.6;margin-bottom:24px}

.invite-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--accent-dim);border:1px solid rgba(232,185,49,.12);border-radius:20px;font-size:12px;font-weight:600;color:var(--accent);margin-bottom:24px}
.invite-badge.badge-open{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.15);color:var(--green)}
.invite-badge svg{width:14px;height:14px}

.form-body{padding:0 32px 32px}

.form-group{margin-bottom:18px}
.form-group:last-of-type{margin-bottom:24px}
.form-label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:8px}
.form-label .icon{width:16px;height:16px;opacity:.5}
.form-label .req{color:var(--red);font-size:13px}

.input-wrap{position:relative}
.input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none;transition:color .2s;z-index:1}
.form-input{width:100%;height:46px;padding:0 14px 0 42px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);transition:all .25s var(--ease)}
.form-input::placeholder{color:var(--text3);font-size:13px}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-input:focus ~ svg{color:var(--accent)}
.form-input.mono{font-family:var(--mono);font-size:13px;letter-spacing:.5px}

.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text3);cursor:pointer;transition:all .15s;z-index:1}
.pwd-toggle:hover{background:var(--surface3);color:var(--text)}
.pwd-toggle svg{width:16px;height:16px}

.pwd-strength{display:flex;gap:4px;margin-top:8px}
.pwd-bar{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background .3s}
.pwd-bar.s1{background:var(--red)}
.pwd-bar.s2{background:var(--orange)}
.pwd-bar.s3{background:var(--accent)}
.pwd-bar.s4{background:var(--green)}
.pwd-hint{font-size:11px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px;min-height:16px}

.btn-submit{width:100%;height:48px;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--orange));border:none;border-radius:var(--r);font-size:14.5px;font-weight:700;color:var(--bg);cursor:pointer;transition:all .25s var(--ease);position:relative;overflow:hidden}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,185,49,.3)}
.btn-submit:active{transform:translateY(0)}
.btn-submit svg{width:18px;height:18px}
.btn-submit .shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%);animation:shimmer 3s infinite}
@keyframes shimmer{to{transform:translateX(100%)}}

.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;white-space:nowrap}

.card-ft{text-align:center;padding:0 32px 32px}
.card-ft p{font-size:13.5px;color:var(--text3)}
.card-ft a{color:var(--accent);font-weight:600;transition:all .15s;position:relative}
.card-ft a::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--accent);transform:scaleX(0);transition:transform .2s var(--ease);transform-origin:right}
.card-ft a:hover::after{transform:scaleX(1);transform-origin:left}

.bottom-brand{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text3);opacity:.5;z-index:1;display:flex;align-items:center;gap:6px}
.bottom-brand svg{width:12px;height:12px}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-16px);padding:10px 20px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:2000;opacity:0;pointer-events:none;transition:all .3s var(--ease);display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .chk{color:var(--green)}
.toast .warn{color:var(--orange)}
.toast .err{color:var(--red)}

.success-overlay{position:fixed;inset:0;background:rgba(8,8,12,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
.success-overlay.show{opacity:1;pointer-events:auto}
.success-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:40px;text-align:center;max-width:380px;transform:scale(.9);transition:transform .3s var(--bounce)}
.success-overlay.show .success-card{transform:scale(1)}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--green-dim);border:2px solid rgba(52,211,153,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.success-icon svg{width:30px;height:30px;color:var(--green)}
.success-card h3{font-size:20px;font-weight:700;margin-bottom:8px}
.success-card p{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5}

@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit .spin{animation:spin .9s linear infinite}

@media(max-width:480px){
  .card-hd,.form-body,.card-ft{padding-left:24px;padding-right:24px}
  .card-title{font-size:20px}
  .brand-icon{width:34px;height:34px;border-radius:10px}
}
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
</div>

<div class="page">
  <div class="auth-card">
    <div class="card-inner">

      <div class="card-hd">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          </div>
          <span class="brand-text">EBU4 文档中心</span>
        </div>
        <h2 class="card-title">注册后台账号</h2>
        <p class="card-desc" id="cardDesc">正在加载站点注册策略…</p>
        <div class="invite-badge" id="inviteBadge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span id="inviteBadgeText">邀请制注册</span>
        </div>
      </div>

      <div class="form-body">
        <form id="regForm" autocomplete="off">

          <div class="form-group">
            <label class="form-label" for="username">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              用户名 <span class="req">*</span>
            </label>
            <div class="input-wrap">
              <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              密码 <span class="req">*</span>
            </label>
            <div class="input-wrap">
              <input class="form-input" type="password" id="password" name="password" placeholder="≥ 8 位字符" autocomplete="new-password" required minlength="8" oninput="checkStrength()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <div class="pwd-toggle" onclick="togglePwd()" role="button" tabindex="0" aria-label="显示或隐藏密码" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePwd();}">
                <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </div>
            </div>
            <div class="pwd-strength" id="pwdStrength">
              <div class="pwd-bar" id="bar1"></div>
              <div class="pwd-bar" id="bar2"></div>
              <div class="pwd-bar" id="bar3"></div>
              <div class="pwd-bar" id="bar4"></div>
            </div>
            <div class="pwd-hint" id="pwdHint"></div>
          </div>

          <div class="form-group" id="inviteGroup">
            <label class="form-label" for="inviteCode">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 7h3a2 2 0 012 2v9a2 2 0 01-2 2h-3"/><path d="M10 21V3"/><path d="M6 7l4-4 4 4"/></svg>
              邀请码 <span class="req" id="inviteReq">*</span><span id="inviteOptHint" style="display:none;font-weight:500;color:var(--text3)">（可选）</span>
            </label>
            <div class="input-wrap">
              <input class="form-input mono" type="text" id="inviteCode" name="invite" placeholder="粘贴邀请码" spellcheck="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btnSubmit" disabled>
            <span class="shimmer"></span>
            <svg class="btn-submit-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            <span id="btnSubmitLabel">注册</span>
          </button>
        </form>

        <div class="divider"><span>或</span></div>
      </div>

      <div class="card-ft">
        <p>已有账号？<a href="/admin/login">去登录</a></p>
      </div>

    </div>
  </div>
</div>

<div class="bottom-brand">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
  Ecology E9 Platform
</div>

<div class="toast" id="toast"><span id="toastIcon" class="chk">✓</span><span id="toastMsg"></span></div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
    </div>
    <h3>注册成功</h3>
    <p>账号已创建完成，正在跳转到登录页面…</p>
    <button type="button" class="btn-submit" onclick="goLogin()" style="max-width:200px;margin:0 auto">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      前往登录
    </button>
  </div>
</div>

<script>
(function () {
  var regMode = 'invitation';
  var cardDesc = document.getElementById('cardDesc');
  var inviteBadge = document.getElementById('inviteBadge');
  var inviteBadgeText = document.getElementById('inviteBadgeText');
  var inviteReq = document.getElementById('inviteReq');
  var inviteOptHint = document.getElementById('inviteOptHint');
  var inviteInput = document.getElementById('inviteCode');

  function applyRegistrationMode() {
    if (regMode === 'open') {
      cardDesc.textContent = '当前为自主注册：可直接注册；若填写邀请码则按该码规则分配角色。';
      inviteBadge.classList.add('badge-open');
      inviteBadgeText.textContent = '开放注册';
      inviteReq.style.display = 'none';
      inviteOptHint.style.display = 'inline';
      inviteInput.removeAttribute('required');
    } else {
      cardDesc.textContent = '当前为邀请制：请使用管理员提供的邀请链接或邀请码完成注册。';
      inviteBadge.classList.remove('badge-open');
      inviteBadgeText.textContent = '邀请制注册';
      inviteReq.style.display = '';
      inviteOptHint.style.display = 'none';
      inviteInput.setAttribute('required', 'required');
    }
  }

  var btnSubmitEl = document.getElementById('btnSubmit');
  var params = new URLSearchParams(window.location.search);
  var codeFromUrl = params.get('invite');

  function startRegisterPage() {
    fetch('/api/site/session', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        regMode = d.registrationMode === 'open' ? 'open' : 'invitation';
        applyRegistrationMode();
      })
      .catch(function () {
        cardDesc.textContent = '邀请制注册：需要有效邀请码。';
        inviteInput.setAttribute('required', 'required');
      })
      .finally(function () {
        if (btnSubmitEl) btnSubmitEl.disabled = false;
      });

    if (codeFromUrl) {
      inviteInput.value = codeFromUrl;
      toast('已自动填入邀请码', 'success');
    }

    document.getElementById('regForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value;
    var ic = document.getElementById('inviteCode').value.trim();
    if (!u) { toast('请输入用户名', 'warn'); return; }
    if (!p || p.length < 8) { toast('密码至少 8 位', 'warn'); return; }
    if (regMode !== 'open' && !ic) { toast('请输入邀请码', 'warn'); return; }

    var btn = document.getElementById('btnSubmit');
    var label = document.getElementById('btnSubmitLabel');
    var ico = document.querySelector('#btnSubmit .btn-submit-ico');
    btn.disabled = true;
    if (label) label.textContent = '注册中…';
    if (ico) {
      ico.classList.add('spin');
      ico.innerHTML = '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>';
    }

    fetch('/api/register', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p, inviteCode: ic }),
    })
      .then(function (r) {
        return r.json().then(function (j) {
          if (!r.ok) throw new Error(j.error || r.statusText);
          return j;
        });
      })
      .then(function () {
        document.getElementById('successOverlay').classList.add('show');
        setTimeout(function () {
          window.location.href = '/admin/login';
        }, 1600);
      })
      .catch(function (err) {
        toast(err.message || String(err), 'error');
      })
      .finally(function () {
        btn.disabled = false;
        if (label) label.textContent = '注册';
        if (ico) {
          ico.classList.remove('spin');
          ico.innerHTML = '<path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>';
        }
      });
    });
  }

  if (codeFromUrl) {
    fetch('/api/register/invite-status?code=' + encodeURIComponent(codeFromUrl), { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.valid === false) {
          var q = 'invite=' + encodeURIComponent(codeFromUrl);
          if (d.reason) q += '&reason=' + encodeURIComponent(d.reason);
          window.location.replace('/register/invalid?' + q);
          return;
        }
        startRegisterPage();
      })
      .catch(function () {
        startRegisterPage();
      });
  } else {
    startRegisterPage();
  }
})();

function toast(msg, type) {
  type = type || 'success';
  var t = document.getElementById('toast');
  var icon = document.getElementById('toastIcon');
  document.getElementById('toastMsg').textContent = msg;
  icon.className = type === 'success' ? 'chk' : type === 'warn' ? 'warn' : 'err';
  icon.textContent = type === 'success' ? '✓' : type === 'warn' ? '⚠' : '✕';
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(function () { t.classList.remove('show'); }, 2800);
}

function togglePwd() {
  var inp = document.getElementById('password');
  var on = document.getElementById('eyeOn');
  var off = document.getElementById('eyeOff');
  if (inp.type === 'password') {
    inp.type = 'text';
    on.style.display = 'none';
    off.style.display = '';
  } else {
    inp.type = 'password';
    on.style.display = '';
    off.style.display = 'none';
  }
}

function checkStrength() {
  var v = document.getElementById('password').value;
  var bars = ['bar1', 'bar2', 'bar3', 'bar4'].map(function (id) {
    return document.getElementById(id);
  });
  var hint = document.getElementById('pwdHint');
  bars.forEach(function (b) { b.className = 'pwd-bar'; });

  if (!v) {
    hint.textContent = '';
    return;
  }

  var score = 0;
  if (v.length >= 8) score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  score = Math.min(score, 4);

  var labels = ['', '弱 — 建议增加长度和特殊字符', '一般 — 可以更复杂', '良好', '强 — 安全性高'];
  var tier = ['', 's1', 's2', 's3', 's4'];
  var cls = tier[score] || 's1';
  for (var i = 0; i < score; i++) {
    bars[i].classList.add(cls);
  }
  hint.textContent = labels[score] || '';
  hint.style.color =
    score <= 1 ? 'var(--red)' : score <= 2 ? 'var(--orange)' : score <= 3 ? 'var(--accent)' : 'var(--green)';
}

function goLogin() {
  window.location.href = '/admin/login';
}

setTimeout(function () {
  var el = document.getElementById('username');
  if (el) el.focus();
}, 500);
</script>
