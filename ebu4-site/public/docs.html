<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#12121c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EBU4 技术支持 — Ecology E9 二开文档</title>
  <script src="/js/seo-config.js"></script>
  <script>
  loadSeoConfig('docs');
  </script>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="/lib/github-dark.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Geometric background grid -->
  <canvas id="bgCanvas"></canvas>

  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <a href="/index" class="logo" title="返回门户首页">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2L22 7V17Q22 22 14 26Q6 22 6 17V7L14 2Z" stroke="#d4a853" stroke-width="1.5" fill="rgba(62,175,124,0.08)"/>
          <path d="M14 9L11 14H17L14 9Z" fill="#d4a853" opacity="0.8"/>
          <circle cx="14" cy="18" r="2" fill="#d4a853" opacity="0.6"/>
        </svg>
        <span>EBU4 <span class="gold">技术支持</span></span>
      </a>
    </div>
    <div class="navbar-center">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="搜索文档… (Ctrl+K)" autocomplete="off">
        <kbd class="search-kbd">⌘K</kbd>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>
    <div class="navbar-right">
      <button type="button" class="nav-pill nav-pill-action" id="btnOpenDocSubmit">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        提交技术文档
      </button>
      <a class="nav-pill" href="https://e-cloudstore.com/e9/index2.html" target="_blank">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4V10Q13 13 7 14Q1 13 1 10V4L7 1Z" stroke="currentColor" stroke-width="1.2"/></svg>
        E9 技术站
      </a>
      <a class="nav-pill" href="https://e-cloudstore.com/doc.html" target="_blank">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 5h4M5 7.5h3M5 10h2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        云商店文档
      </a>
      <div class="theme-picker" id="themePicker">
        <button type="button" class="theme-trigger" id="themeTrigger" aria-haspopup="true" aria-expanded="false" aria-controls="themePanel" title="外观（浅色 / 深色 / 跟随系统）">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.89-.12-1.32a7 7 0 0 1-8.88-8.88A8.94 8.94 0 0 0 12 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="theme-panel" id="themePanel" role="menu" hidden>
          <div class="theme-panel-title">外观</div>
          <div class="theme-swatches" role="group" aria-label="浅色深色与系统">
            <button type="button" class="theme-swatch" data-theme="light" title="浅色" aria-label="浅色"><span class="dot" style="--a:#ffffff;--b:#e2e8f0"></span><span class="name">浅色</span></button>
            <button type="button" class="theme-swatch" data-theme="dark" title="深色" aria-label="深色"><span class="dot" style="--a:#1e1b4b;--b:#020617"></span><span class="name">深色</span></button>
            <button type="button" class="theme-swatch" data-theme="system" title="跟随系统" aria-label="跟随系统"><span class="dot dot-system" aria-hidden="true"></span><span class="name">跟随系统</span></button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout" id="layoutRoot">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-label">文档导航</span>
        <select id="publicDocPicker" class="public-doc-picker" hidden aria-label="选择主文档"></select>
        <div id="publicDocPublishMeta" class="sidebar-doc-meta" hidden></div>
      </div>
      <div class="sidebar-content" id="sidebarNav">
        <div class="sidebar-loading" aria-live="polite">
          <span class="sidebar-loading-pulse"></span>
          <span>加载目录…</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-status">
          <span class="status-dot"></span>
          <span>文档版本 1.0</span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="content" id="contentArea">
      <div class="loading">
        <div class="loading-shield">
          <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L22 7V17Q22 22 14 26Q6 22 6 17V7L14 2Z" stroke="#d4a853" stroke-width="1.5" fill="rgba(62,175,124,0.08)"/>
          </svg>
        </div>
        <p>加载中…</p>
      </div>
    </main>

    <!-- TOC -->
    <aside class="toc-aside" id="tocAside">
      <div class="toc-header">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3h4M2 7h4M2 11h4" stroke="#d4a853" stroke-width="1.2" stroke-linecap="round"/><path d="M8 3h4M8 7h4M8 11h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/></svg>
        <span>本页目录</span>
      </div>
      <div id="tocList"></div>
    </aside>
  </div>

  <!-- Bottom status bar -->
  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot green"></span>
      <span>文档在线</span>
    </div>
    <div class="status-item">
      <span class="status-dot green"></span>
      <span>图片服务正常</span>
    </div>
    <div class="status-item">
      <span class="status-dot gold"></span>
      <span>搜索引擎就绪</span>
    </div>
    <div class="status-sep"></div>
    <div class="status-item right">
      <span class="site-footer-brand">Ecology E9 Platform</span>
    </div>
  </div>

  <div class="public-modal" id="docSubmitModal" hidden>
    <div class="public-modal-dialog">
      <div class="public-modal-head">
        <strong>提交技术文档</strong>
        <button type="button" class="public-modal-close" id="btnCloseDocSubmit" aria-label="关闭">×</button>
      </div>
      <div class="public-modal-body">
        <label class="public-field"><span>标题</span><input id="docSubmitTitle" class="public-input" type="text" maxlength="120" placeholder="例如：E9 流程引擎二开指南" /></label>
        <label class="public-field"><span>投稿类型</span>
          <select id="docSubmitTargetType" class="public-input">
            <option value="main">主文档</option>
            <option value="extra">扩展文档</option>
          </select>
        </label>
        <label class="public-field" id="docSubmitMainWrap"><span>目标主文档</span>
          <select id="docSubmitMainDoc" class="public-input"></select>
        </label>
        <label class="public-field"><span>标签（逗号分隔）</span><input id="docSubmitTags" class="public-input" type="text" placeholder="E9, 二开, 流程" /></label>
        <div class="public-field">
          <span>Markdown 文件（.md）</span>
          <input id="docSubmitFile" class="public-input" type="file" accept=".md,text/markdown" />
        </div>
        <div class="public-grid2">
          <label class="public-field"><span>提交人</span><input id="docSubmitName" class="public-input" type="text" maxlength="40" placeholder="可选" /></label>
          <label class="public-field"><span>联系方式</span><input id="docSubmitContact" class="public-input" type="text" maxlength="80" placeholder="邮箱/微信（可选）" /></label>
        </div>
        <div class="public-submit-msg" id="docSubmitMsg" aria-live="polite"></div>
      </div>
      <div class="public-modal-foot">
        <button type="button" class="home-btn ghost" id="btnCancelDocSubmit">取消</button>
        <button type="button" class="home-btn primary" id="btnDoDocSubmit">提交审核</button>
      </div>
    </div>
  </div>

  <script src="/lib/marked.min.js"></script>
  <script src="/lib/highlight.min.js"></script>
  <script src="/lib/hl-java.min.js"></script>
  <script src="/lib/hl-javascript.min.js"></script>
  <script src="/lib/hl-xml.min.js"></script>
  <script src="/lib/hl-json.min.js"></script>
  <script src="/lib/hl-bash.min.js"></script>
  <script src="/js/register-sw.js" defer></script>
  <script src="/js/lazy-images.js" defer></script>
  <script src="/js/docs-chrome.js" defer></script>
  <script src="/js/app.js" defer></script>
  <!-- EBU4_EMBED_AI_SLOT：站点设置「前台 AI 嵌入」注入位置；也可由服务端在 </body> 前自动插入 -->
</body>
</html>
