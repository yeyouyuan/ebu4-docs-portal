<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>EBU4 · 后台登录</title>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--surface:#111118;--surface2:#18181f;--surface3:#22222e;
  --border:#252535;--border2:#333348;
  --text:#e4e4ef;--text2:#9898aa;--text3:#5e5e74;
  --accent:#e8b931;--accent2:#f0c848;--accent-dim:rgba(232,185,49,.08);--accent-glow:rgba(232,185,49,.15);
  --red:#ef4444;--red-dim:rgba(239,68,68,.08);
  --green:#34d399;--green-dim:rgba(52,211,153,.08);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.08);
  --purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --r:10px;--r2:14px;--r3:18px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow2:0 8px 40px rgba(0,0,0,.6);
  --ease:cubic-bezier(.4,0,.2,1);
  --bounce:cubic-bezier(.34,1.56,.64,1);
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden}
input,button,select,textarea{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;outline:none}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 35%,rgba(232,185,49,.05),transparent 65%),radial-gradient(ellipse 60% 50% at 75% 75%,rgba(96,165,250,.04),transparent 55%),radial-gradient(ellipse 55% 45% at 20% 70%,rgba(167,139,250,.03),transparent 55%)}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 75% 75% at 50% 45%,black,transparent)}
.bg-orbs{position:absolute;inset:0}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.08;animation:orbFloat 16s ease-in-out infinite}
.orb-1{width:350px;height:350px;background:var(--accent);top:-100px;right:5%;animation-delay:0s}
.orb-2{width:260px;height:260px;background:var(--blue);bottom:-80px;left:10%;animation-delay:-5s}
.orb-3{width:200px;height:200px;background:var(--purple);top:30%;left:65%;animation-delay:-10s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.03)}66%{transform:translate(-15px,10px) scale(.97)}}

.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}

.auth-card{width:100%;max-width:420px;opacity:0;animation:cardIn .7s var(--ease) forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.card-inner{background:rgba(17,17,24,.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;box-shadow:var(--shadow2);position:relative}
.card-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),var(--orange),var(--accent),transparent);opacity:.8}

.card-hd{padding:36px 36px 0;text-align:center}

.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.brand-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--orange));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(232,185,49,.3);position:relative}
.brand-icon::after{content:'';position:absolute;inset:-3px;border-radius:15px;background:linear-gradient(135deg,var(--accent),var(--orange));opacity:.15;filter:blur(8px)}
.brand-icon svg{width:24px;height:24px;color:var(--bg);position:relative;z-index:1}
.brand-text{font-size:16px;font-weight:800;letter-spacing:.6px}

.card-title{font-size:25px;font-weight:800;letter-spacing:-.3px;margin-bottom:8px}
.card-desc{font-size:13.5px;color:var(--text3);line-height:1.65;margin-bottom:28px;max-width:320px;margin-left:auto;margin-right:auto}

.mode-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:24px;flex-wrap:wrap}
.mode-tab{flex:1;min-width:30%;padding:8px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text3);border-radius:7px;cursor:pointer;transition:all .15s}
.mode-tab:hover{color:var(--text2)}
.mode-tab.on{background:var(--accent-dim);color:var(--accent);box-shadow:0 1px 4px rgba(232,185,49,.1)}

.form-body{padding:0 36px 36px}

.form-group{margin-bottom:18px;transition:all .3s var(--ease)}
.form-group.hidden{opacity:0;max-height:0;margin:0;overflow:hidden;pointer-events:none}
.form-group.show{opacity:1;max-height:80px}
.form-label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:8px}
.form-label svg{width:15px;height:15px;opacity:.45}
.form-label .req{color:var(--red);font-size:13px}

.input-wrap{position:relative}
.input-wrap .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--text3);pointer-events:none;transition:color .2s;z-index:1}
.form-input{width:100%;height:48px;padding:0 14px 0 44px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);transition:all .25s var(--ease)}
.form-input::placeholder{color:var(--text3);font-size:13px}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-input:focus ~ .input-icon{color:var(--accent)}
.form-input.has-error{border-color:var(--red);box-shadow:0 0 0 3px var(--red-dim)}

.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--text3);cursor:pointer;transition:all .15s;z-index:1}
.pwd-toggle:hover{background:var(--surface3);color:var(--text)}
.pwd-toggle svg{width:16px;height:16px}

.remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.checkbox{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:color .15s}
.checkbox:hover{color:var(--text)}
.checkbox-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);flex-shrink:0}
.checkbox-box svg{width:12px;height:12px;color:var(--bg);opacity:0;transition:opacity .15s}
.checkbox.on .checkbox-box{background:var(--accent);border-color:var(--accent)}
.checkbox.on .checkbox-box svg{opacity:1}
.forgot-link{font-size:12.5px;color:var(--text3);transition:color .15s}
.forgot-link:hover{color:var(--accent)}

.btn-submit{width:100%;height:50px;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--accent),#e0a820);border:none;border-radius:var(--r);font-size:15px;font-weight:700;color:var(--bg);cursor:pointer;transition:all .25s var(--ease);position:relative;overflow:hidden;letter-spacing:.3px}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(232,185,49,.35);background:linear-gradient(135deg,var(--accent2),var(--accent))}
.btn-submit:active{transform:translateY(0);box-shadow:0 2px 12px rgba(232,185,49,.2)}
.btn-submit svg{width:18px;height:18px}
.btn-submit .shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);animation:shimmer 3.5s infinite}
@keyframes shimmer{to{transform:translateX(100%)}}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.btn-secondary{width:100%;height:46px;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s var(--ease);margin-bottom:12px}
.btn-secondary:hover{border-color:var(--text3);color:var(--text)}
.btn-secondary:disabled{opacity:.45;cursor:not-allowed}

.passkey-hint{font-size:12.5px;color:var(--text3);line-height:1.7;margin-bottom:16px;text-align:left}

.error-msg{display:none;align-items:center;gap:6px;padding:10px 14px;background:var(--red-dim);border:1px solid rgba(239,68,68,.12);border-radius:var(--r);font-size:12.5px;color:var(--red);margin-bottom:16px;animation:fadeSlide .3s var(--ease)}
.error-msg.show{display:flex}
.error-msg svg{width:15px;height:15px;flex-shrink:0}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;white-space:nowrap}

.card-ft{text-align:center;padding:0 36px 32px}
.card-ft p{font-size:13.5px;color:var(--text3)}
.card-ft a{color:var(--accent);font-weight:600;transition:all .15s;position:relative}
.card-ft a::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--accent);transform:scaleX(0);transition:transform .2s var(--ease);transform-origin:right}
.card-ft a:hover::after{transform:scaleX(1);transform-origin:left}

.security-notice{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);background:rgba(0,0,0,.15)}
.security-notice svg{width:12px;height:12px;opacity:.5;flex-shrink:0}

.bottom-brand{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text3);opacity:.4;z-index:1;display:flex;align-items:center;gap:6px}
.bottom-brand svg{width:12px;height:12px}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-16px);padding:10px 20px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:2000;opacity:0;pointer-events:none;transition:all .3s var(--ease);display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .chk{color:var(--green)}
.toast .warn{color:var(--orange)}
.toast .err{color:var(--red)}

.shake{animation:shake .5s var(--ease)}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-4px)}20%,40%,60%,80%{transform:translateX(4px)}}

@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .card-hd,.form-body,.card-ft{padding-left:24px;padding-right:24px}
  .card-title{font-size:21px}
  .brand-icon{width:38px;height:38px;border-radius:11px}
  .security-notice{padding:10px 16px;font-size:10.5px}
}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
</div>

<div class="page">
  <div class="auth-card" id="authCard">
    <div class="card-inner">

      <div class="card-hd">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          </div>
          <span class="brand-text">EBU4 技术支持</span>
        </div>
        <h2 class="card-title">后台登录</h2>
        <p class="card-desc" id="cardDesc">使用用户名与密码进入控制台。仅填密码可兼容旧版单密码登录。</p>
      </div>

      <div class="form-body">
        <form id="loginForm" onsubmit="return handleLogin(event)">

          <div class="mode-tabs" id="modeTabs">
            <div class="mode-tab on" data-mode="user" onclick="switchMode('user')">用户名 + 密码</div>
            <div class="mode-tab" data-mode="pwd" onclick="switchMode('pwd')">仅密码</div>
            <div class="mode-tab" data-mode="passkey" onclick="switchMode('passkey')">通行密钥</div>
          </div>

          <div class="error-msg" id="errorMsg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="errorText">用户名或密码错误</span>
          </div>

          <div class="form-group show" id="usernameGroup">
            <label class="form-label" for="username">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              用户名
            </label>
            <div class="input-wrap">
              <input class="form-input" type="text" id="username" placeholder="请输入用户名" autocomplete="username">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
          </div>

          <div class="form-group show" id="passwordGroup">
            <label class="form-label" for="password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              密码
            </label>
            <div class="input-wrap">
              <input class="form-input" type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <div class="pwd-toggle" onclick="togglePwd()">
                <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </div>
            </div>
          </div>

          <div class="form-group hidden" id="passkeyGroup">
            <p class="passkey-hint" id="passkeyHint">输入已在后台绑定的用户名，使用本机已注册的通行密钥（指纹 / Face ID / 安全密钥）登录。需在「用户管理」中先为该账号添加通行密钥。</p>
            <button type="button" class="btn-secondary" id="btnPasskey" onclick="doPasskeyLogin()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 11c0 3.517-1.35 9-9 9 0-1.5 1-3 3-3s3.5 1.5 1.5 1.5 1-3 3-3 3 1.5 3 3s-1.5 3-3 3 1.5 3 3 3 3-3 3-3"/></svg>
              使用通行密钥登录
            </button>
          </div>

          <div class="remember-row" id="rememberRow">
            <div class="checkbox on" id="rememberCb" onclick="this.classList.toggle('on')">
              <div class="checkbox-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
              </div>
              <span>记住登录状态</span>
            </div>
            <a class="forgot-link" href="#" onclick="toast('请联系管理员重置密码','warn');return false">忘记密码？</a>
          </div>

          <button type="submit" class="btn-submit" id="btnSubmit">
            <span class="shimmer"></span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            <span id="btnSubmitLabel">进入控制台</span>
          </button>
        </form>

        <div class="divider"><span>或</span></div>
      </div>

      <div class="card-ft">
        <p>还没有账号？<a href="/register">申请邀请码</a></p>
      </div>

      <div class="security-notice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        安全区域 · 请勿截屏分享凭据
      </div>

    </div>
  </div>
</div>

<div class="bottom-brand">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
  Ecology E9 Platform
</div>

<div class="toast" id="toast"><span id="toastIcon" class="chk">✓</span><span id="toastMsg"></span></div>

<script src="/js/webauthn-client.js?v=20260324a"></script>
<script src="/js/admin-login.js?v=20260324a"></script>
</body>
</html>
