<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    try {
      var k = 'ebu4-theme';
      var v = localStorage.getItem(k) || 'system';
      var legacy = { default: 1, ocean: 1, rose: 1, emerald: 1, violet: 1 };
      if (legacy[v]) v = 'dark';
      if (v !== 'light' && v !== 'dark' && v !== 'system') v = 'system';
      var resolved = v === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : v;
      document.documentElement.dataset.theme = resolved;
    } catch (e) {
      document.documentElement.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#12121c" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <title>站点维护中 — EBU4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'DM Sans', 'Noto Sans SC', system-ui;
      --font-body: 'Noto Sans SC', 'DM Sans', system-ui;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --r-sm: 8px;
      --r-md: 14px;
      --r-full: 9999px;
    }
    [data-theme="dark"] {
      --bg: #09090f;
      --bg-card: #171724;
      --border: rgba(255,255,255,0.08);
      --t1: #e8e8f0;
      --t2: #a8a8c0;
      --t3: #6e6e8a;
      --brand: #3b82f6;
      --brand-2: #60a5fa;
      --gold: #d4a853;
      --gold-dim: rgba(212,168,83,0.35);
      --grad-1: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --shadow: 0 16px 48px rgba(0,0,0,0.45);
    }
    [data-theme="light"] {
      --bg: #f5f5f7;
      --bg-card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --t1: #111118;
      --t2: #555568;
      --t3: #8888a0;
      --brand: #2563eb;
      --brand-2: #3b82f6;
      --gold: #b8860b;
      --gold-dim: rgba(184,134,11,0.25);
      --grad-1: linear-gradient(135deg, #2563eb, #7c3aed);
      --shadow: 0 16px 48px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
    }
    .noise-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
    }
    .top-nav {
      position: relative;
      z-index: 10;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(20px, 3vw, 40px);
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-sm);
      background: var(--grad-1);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 11px;
      box-shadow: 0 2px 10px rgba(59,130,246,0.35);
    }
    .nav-brand-text { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
    .nav-brand-sub { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .badge-maint {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: var(--r-full);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      background: rgba(212,168,83,0.08);
    }
    .wrap {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      padding: clamp(24px, 5vw, 48px);
    }
    .card {
      width: 100%;
      max-width: 440px;
      padding: clamp(28px, 4vw, 40px);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .card-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(59,130,246,0.15), rgba(139,92,246,0.12));
      border: 1px solid rgba(59,130,246,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg { opacity: 0.9; }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 3vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      background: var(--grad-1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .msg {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--t2);
      margin-bottom: 24px;
    }
    .hint {
      font-size: 0.78rem;
      color: var(--t3);
      line-height: 1.5;
    }
    .theme-float {
      position: fixed;
      bottom: 52px;
      right: 24px;
      z-index: 20;
    }
    .theme-trigger {
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--t2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.2s var(--ease-out);
    }
    .theme-trigger:hover { transform: scale(1.05); color: var(--t1); }
    .theme-panel {
      position: absolute;
      bottom: 52px;
      right: 0;
      min-width: 160px;
      padding: 8px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow);
    }
    .theme-panel[hidden] { display: none !important; }
    .theme-panel-title { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 8px 8px; }
    .theme-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: var(--r-sm);
      background: transparent;
      color: var(--t2);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .theme-opt:hover { background: rgba(59,130,246,0.08); color: var(--t1); }
    /* 与文档站 / 后台 .status-bar 底栏风格一致 */
    .maint-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg-card) 88%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 8;
    }
    .maint-footer .site-footer-brand {
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--t3);
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <div class="noise-overlay" aria-hidden="true"></div>

  <header class="top-nav">
    <div class="nav-brand">
      <div class="nav-logo" aria-hidden="true">E9</div>
      <div>
        <div class="nav-brand-text">EBU4 <span style="color:var(--gold)">技术支持</span></div>
        <div class="nav-brand-sub">Ecology E9 二次开发</div>
      </div>
    </div>
    <span class="badge-maint">维护中</span>
  </header>

  <main class="wrap">
    <div class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="url(#g)" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 8v4M12 16h.01" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
          <defs><linearGradient id="g" x1="4" y1="2" x2="20" y2="22"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <h1>站点维护中</h1>
      <p class="msg">{{MESSAGE}}</p>
      <p class="hint">我们正在升级或部署内容，请稍后刷新重试。管理后台在维护期间仍可使用。</p>
    </div>
  </main>

  <footer class="maint-footer" role="contentinfo">
    <span class="site-footer-brand">Ecology E9 Platform</span>
  </footer>

  <div class="theme-float" id="themePicker">
    <button type="button" class="theme-trigger" id="themeTrigger" aria-haspopup="true" aria-expanded="false" aria-controls="themePanel" title="外观">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="theme-panel" id="themePanel" role="menu" hidden>
      <div class="theme-panel-title">外观</div>
      <button type="button" class="theme-opt" data-theme="light">浅色</button>
      <button type="button" class="theme-opt" data-theme="dark">深色</button>
      <button type="button" class="theme-opt" data-theme="system">跟随系统</button>
    </div>
  </div>

  <script>
  (function () {
    var k = 'ebu4-theme';
    function applyTheme(name) {
      var allowed = { light: 1, dark: 1, system: 1 };
      var t = allowed[name] ? name : 'system';
      if (t === 'system') {
        t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = t;
      try { localStorage.setItem(k, name === 'system' ? 'system' : t); } catch (e) {}
    }
    var trigger = document.getElementById('themeTrigger');
    var panel = document.getElementById('themePanel');
    if (trigger && panel) {
      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = panel.hidden;
        panel.hidden = !open;
        trigger.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', function () {
        panel.hidden = true;
        trigger.setAttribute('aria-expanded', 'false');
      });
      panel.querySelectorAll('.theme-opt').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var name = btn.getAttribute('data-theme');
          try {
            if (name === 'system') localStorage.setItem(k, 'system');
            else localStorage.setItem(k, name);
          } catch (err) {}
          applyTheme(name);
          panel.hidden = true;
        });
      });
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
      try {
        if (localStorage.getItem(k) === 'system') applyTheme('system');
      } catch (e) {}
    });
  })();
  </script>
  <script>
  (function () {
    var canvas = document.getElementById('bgCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var w, h;
    var particles = [];
    var P = 36;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    for (var i = 0; i < P; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        r: Math.random() * 1.2 + 0.4
      });
    }
    function tick() {
      var dark = document.documentElement.dataset.theme === 'dark';
      var rgb = dark ? '59,130,246' : '37,99,235';
      var gold = dark ? '212,168,83' : '180,140,40';
      ctx.clearRect(0, 0, w, h);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = i % 3 === 0 ? 'rgba(' + gold + ',0.35)' : 'rgba(' + rgb + ',0.2)';
        ctx.fill();
      }
      requestAnimationFrame(tick);
    }
    tick();
  })();
  </script>
</body>
</html>
